name: Push to mirror

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  push_to_mirror:
    name: Push to mirror
    if: ${{ github.repository_owner == 'hugoarnal' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Pushing to mirror repo
        uses: pixta-dev/repository-mirroring-action@674e65a7d483ca28dafaacba0d07351bdcc8bd75 # v1.1.1
        with:
          target_repo_url: git@codeberg.org:hugoarnal/gigot.git
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
